<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mov2ST Time Sum</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111b;
      --bg2: #142234;
      --card: rgba(12, 22, 35, 0.78);
      --glass: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f7fb;
      --sub: #a8b3c3;
      --cyan: #7dd3fc;
      --green: #30d158;
      --red: #ff453a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.14), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
    }

    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 138px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
    }

    .label {
      margin-bottom: 6px;
      color: var(--sub);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .value {
      font-size: 24px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .value.accent {
      color: var(--cyan);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.72fr);
      gap: 16px;
      align-items: start;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 15px;
    }

    button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: 700 13px/1 Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    button.primary {
      border: 0;
      background: linear-gradient(135deg, #f5f7fb, #b9d8ff);
      color: #07111f;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    button.primary:hover {
      background: linear-gradient(135deg, #ffffff, #c9e2ff);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 420px;
      padding: 16px;
      resize: vertical;
      border: 0;
      outline: 0;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font: 500 15px/1.55 Consolas, "SFMono-Regular", monospace;
    }

    .rows {
      max-height: 482px;
      overflow: auto;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .line-text {
      min-width: 0;
      overflow: hidden;
      color: rgba(245, 247, 251, 0.86);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .minutes {
      color: var(--cyan);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      padding: 22px 16px;
      color: var(--sub);
      font-size: 14px;
    }

    .error {
      color: #ffd4cf;
    }

    @media (max-width: 820px) {
      header,
      .grid {
        display: block;
      }

      .summary {
        justify-content: stretch;
        margin-top: 14px;
      }

      .stat {
        flex: 1 1 130px;
      }

      section + section {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Time Sum</h1>
      <div class="summary" aria-live="polite">
        <div class="stat">
          <div class="label">Total Time</div>
          <div class="value accent" id="total-time">00:00</div>
        </div>
        <div class="stat">
          <div class="label">Total Minutes</div>
          <div class="value" id="total-minutes">0</div>
        </div>
        <div class="stat">
          <div class="label">Lines Counted</div>
          <div class="value" id="line-count">0</div>
        </div>
      </div>
    </header>

    <div class="grid">
      <section>
        <div class="panel-head">
          <h2>Paste Times</h2>
          <div class="actions">
            <button type="button" id="sample">Sample</button>
            <button type="button" id="reset">Reset</button>
          </div>
        </div>
        <textarea id="input" spellcheck="false" placeholder="Paste a list like:
00:25:12
14:40
35m
1h 12m
90"></textarea>
      </section>

      <section>
        <div class="panel-head">
          <h2>Counted Lines</h2>
          <button type="button" class="primary" id="copy">Copy Total</button>
        </div>
        <div class="rows" id="rows">
          <div class="empty">Paste times to see the list.</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const input = document.getElementById("input");
    const rows = document.getElementById("rows");
    const totalTime = document.getElementById("total-time");
    const totalMinutes = document.getElementById("total-minutes");
    const lineCount = document.getElementById("line-count");
    const resetBtn = document.getElementById("reset");
    const copyBtn = document.getElementById("copy");
    const sampleBtn = document.getElementById("sample");

    const sample = [
      "00:25:12",
      "14:40",
      "35m",
      "1h 12m",
      "90"
    ].join("\n");

    const toClock = (seconds) => {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) {
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    };

    const parseLine = (line) => {
      const text = line.trim();
      if (!text) return null;

      let seconds = 0;
      let matched = false;
      let remaining = text;

      remaining = remaining.replace(/\b(\d{1,3}):(\d{2})(?::(\d{2}))?\b/g, (_, a, b, c) => {
        matched = true;
        seconds += c === undefined
          ? Number(a) * 60 + Number(b)
          : Number(a) * 3600 + Number(b) * 60 + Number(c);
        return " ";
      });

      remaining = remaining.replace(/\b(\d+(?:\.\d+)?)\s*(h|hr|hrs|hour|hours|m|min|mins|minute|minutes|s|sec|secs|second|seconds)\b/gi, (_, amount, unit) => {
        matched = true;
        const value = Number(amount);
        const u = unit.toLowerCase();
        if (u.startsWith("h")) seconds += value * 3600;
        else if (u.startsWith("m")) seconds += value * 60;
        else seconds += value;
        return " ";
      });

      if (!matched && /^\d+(?:\.\d+)?$/.test(text)) {
        matched = true;
        seconds = Number(text) * 60;
      }

      return matched ? { text, seconds } : { text, seconds: 0, error: true };
    };

    const render = () => {
      const parsed = input.value.split(/\r?\n/).map(parseLine).filter(Boolean);
      const counted = parsed.filter((item) => !item.error);
      const totalSeconds = counted.reduce((sum, item) => sum + item.seconds, 0);
      const minutes = Math.round((totalSeconds / 60) * 100) / 100;

      totalTime.textContent = toClock(totalSeconds);
      totalMinutes.textContent = Number.isInteger(minutes) ? String(minutes) : minutes.toFixed(2);
      lineCount.textContent = String(counted.length);

      rows.innerHTML = "";
      if (parsed.length === 0) {
        rows.innerHTML = '<div class="empty">Paste times to see the list.</div>';
        return;
      }

      parsed.forEach((item) => {
        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = item.error ? "line-text error" : "line-text";
        label.textContent = item.text;

        const value = document.createElement("div");
        value.className = "minutes";
        value.textContent = item.error ? "-" : `${Math.round((item.seconds / 60) * 100) / 100}m`;

        row.append(label, value);
        rows.append(row);
      });
    };

    input.addEventListener("input", render);
    resetBtn.addEventListener("click", () => {
      input.value = "";
      input.focus();
      render();
    });
    sampleBtn.addEventListener("click", () => {
      input.value = sample;
      render();
    });
    copyBtn.addEventListener("click", async () => {
      await navigator.clipboard.writeText(totalMinutes.textContent);
      copyBtn.textContent = "Copied";
      setTimeout(() => {
        copyBtn.textContent = "Copy Total";
      }, 900);
    });

    render();
  </script>
</body>
</html>
